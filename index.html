<!DOCTYPE html>

<head>
<!-- Imports the Mapbox GL JS bundle -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.js"></script>
<!-- Includes the Mapbox GL JS CSS stylesheet -->
<link href="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.css" rel="stylesheet">
<link href="home.css" rel="stylesheet">
</head>


<body>
<div id="map" style="width: 1920px; height: 1080px;"></div>
<script src="geo.js"></script>

<!--Alvernia button flyout-->
<button id="Alvernia">Alvernia Planet</button>
<script>
    document.getElementById('Alvernia').addEventListener('click', () => {
        map.flyTo({
            center: [19.5475044, 50.1026258],
            zoom: 15,
            essential: true // this animation is considered essential with respect to prefers-reduced-motion
        });
    });
</script>

</body>

</html>
